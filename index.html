async function loadPdfJs() {
  if (window.pdfjsLib) return window.pdfjsLib;
  await new Promise((res, rej) => { const s = document.createElement("script"); s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"; s.onload = res; s.onerror = rej; document.head.appendChild(s); });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  return window.pdfjsLib;
}
async function extractPdf(file) {
  const lib = await loadPdfJs(), pdf = await lib.getDocument({ data: await file.arrayBuffer() }).promise;
  let txt = "";
  for (let i = 1; i <= pdf.numPages; i++) { const pg = await pdf.getPage(i), c = await pg.getTextContent(); txt += c.items.map(x => x.str).join(" ") + "\n\n"; }
  return txt.trim();
}
const readFile = (f) => (f.name.toLowerCase().endsWith(".pdf") || f.type === "application/pdf") ? extractPdf(f) : f.text();

function parseSections(text) {
  if (!text) return [];
  const clean = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  if (clean.includes("===")) {
    const secs = [], parts = clean.split(/===([^=\r\n]+)===/);
    for (let i = 1; i < parts.length; i += 2) {
      const titolo = parts[i].trim(), contenuto = (parts[i + 1] || "").trim();
      if (titolo && contenuto) secs.push({ titolo, contenuto });
    }
    if (secs.length) return secs;
  }
  return [{ titolo: "Descrizione", contenuto: fixText(clean) }];
}

// ── TIMELINE ──────────────────────────────────────────────────────────────────
function parseAnnoMAW(raw) {
  if (!raw) return null;
  const s = raw.trim();
  const bmaw = s.match(/^([\d.,]+)\s*BMAW$/i);
  if (bmaw) return -parseFloat(bmaw[1].replace(/\./g, "").replace(",", "."));
  const maw = s.match(/^(?:anno\s+)?([\d.,]+)\s*(?:MAW)?$/i);
  if (maw) return parseFloat(maw[1].replace(/\./g, "").replace(",", "."));
  return null;
}
function parseTimeline(text) {
  if (!text) return { epoche: [] };
  const lines = text.split("\n");
  let curEpoca = null, curEvento = null;
  const epoche = [];
  const pushEvento = () => { if (curEvento && curEpoca) curEpoca.eventi.push(curEvento); curEvento = null; };
  const pushEpoca = () => { pushEvento(); if (curEpoca) epoche.push(curEpoca); curEpoca = null; };
  for (const raw of lines) {
    const l = raw.trim();
    const epocaM = l.match(/^===(.+)===$/);
    if (epocaM) { pushEpoca(); const titolo = epocaM[1].trim(); curEpoca = { titolo, eventi: [] }; continue; }
    const evM = l.match(/^###(.+)###$/);
    if (evM) {
      pushEvento();
      const inner = evM[1].trim(), sepM = inner.match(/^(.+?)\s*[·•]\s*(.+)$/);
      let annoRaw = "", titolo = inner;
      if (sepM) { annoRaw = sepM[1].trim(); titolo = sepM[2].trim(); }
      if (!curEpoca) curEpoca = { titolo: "Eventi", eventi: [] };
      curEvento = { titolo, annoRaw, anno: parseAnnoMAW(annoRaw), razza: "", descrizione: "" };
      continue;
    }
    if (curEvento) {
      const razzaM = l.match(/^\*\*(.+?)\*\*\s*(?:—|-|–)?\s*(.*)/);
      if (razzaM && !curEvento.razza) { curEvento.razza = razzaM[1]; if (razzaM[2]) curEvento.descrizione += razzaM[2] + " "; }
      else if (l) curEvento.descrizione += l + " ";
    }
  }
  pushEpoca();
  return { epoche };
}

                  <div>
                    <div style={{ fontSize: 11, color: C, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", marginBottom: 2 }}>{meta ? meta.short : e.title}</div>
                    {isOwn && !isMaster && <div style={{ fontSize: 10, color: C, opacity: 0.7 }}>La tua razza</div>}
                  </div>
                </div>
                {meta && <p style={{ margin: "0 0 10px", fontSize: 11, color: "#6d5fa0", fontStyle: "italic", lineHeight: 1.5 }}>{meta.motto}</p>}
                <div style={{ fontSize: 11, color: "#4a4a6a" }}>{parseSections(e.public_content).length} sezioni</div>
              </div>
            </button>;
          })}
        </div>

        {/* Razze bloccate visibili al Master con opzione sblocco */}
        {isMaster && (
          <div>
            <p style={{ margin: "0 0 16px", fontSize: 11, color: "#4a4a6a", textTransform: "uppercase", letterSpacing: 2 }}>Gestione sblocchi per giocatore</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {PLAYERS_DEFAULT.map(pl => {
                const plUnlocks = unlocks[pl.username] || [];
                return (
                  <div key={pl.username} style={{ padding: "14px 18px", borderRadius: 12, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)" }}>

                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                      {RAZZE_META.map(r => {
                        const isOwn = r.id === pl.razza;

                        return (
                          <button key={r.id} onClick={() => !isOwn && onUnlock(pl.username, r.id, !isUnlocked)} style={{ padding: "4px 12px", borderRadius: 20, border: `1px solid ${r.colore}${isUnlocked ? "99" : "33"}`, background: isUnlocked ? `${r.colore}20` : "transparent", color: isUnlocked ? r.colore : "#4a4a6a", fontSize: 11, fontWeight: 600, cursor: isOwn ? "default" : "pointer" }}>
                            {isOwn ? "⭐" : isUnlocked ? "🔓" : "🔒"} {r.short}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

        {/* Razze bloccate per il giocatore */}

            <p style={{ margin: "0 0 16px", fontSize: 11, color: "#4a4a6a", textTransform: "uppercase", letterSpacing: 2 }}>Razze sconosciute</p>

                return <div key={id} style={{ padding: "16px 18px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.06)", background: "rgba(0,0,0,0.3)", filter: "blur(0px)" }}>

                </div>;
              })}
            </div>
          </div>
        )}
      </div>
    );
  }

  const entry = entries.find(e => e.id === selRace.id) || selRace;
  const meta = getRazzaMeta(entry.title);
  const C = meta ? meta.colore : "#7c3aed", BG = meta ? meta.bg : "rgba(124,58,237,0.07)", GLOW = meta ? meta.glow : "rgba(124,58,237,0.18)", icona = meta ? meta.icona : "🧬";
  const pubS = parseSections(entry.public_content), privS = isMaster ? parseSections(entry.private_content || "") : [];

  if (selSec) return (

      <div style={{ flex: 1, overflowY: "auto", padding: "36px 48px" }}>
        <div style={{ maxWidth: 760 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 28, paddingBottom: 20, borderBottom: `1px solid ${C}22` }}>
            <div style={{ width: 44, height: 44, borderRadius: 10, background: BG, border: `1px solid ${C}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, color: C }}>{selSec.secret ? "🔐" : icona}</div>
            <div><div style={{ fontSize: 10, color: C, letterSpacing: 2, textTransform: "uppercase", marginBottom: 3 }}>{meta ? meta.short : entry.title} · {selSec.secret ? "Riservato" : "Lore"}</div><h1 style={{ margin: 0, fontSize: 24, fontWeight: 900, color: selSec.secret ? C : "#e2d9f3" }}>{selSec.titolo}</h1></div>
          </div>
          <MD text={selSec.contenuto} accentColor={C} />
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Breadcrumb items={[{ label: "🧬 Razze", onClick: () => setSelRace(null) }, { label: meta ? meta.short : entry.title, color: C }]} />
      {isMaster && <div style={{ padding: "8px 24px", display: "flex", gap: 8, justifyContent: "flex-end", borderBottom: "1px solid rgba(255,255,255,0.06)", flexShrink: 0 }}>
        <button onClick={() => onEdit(entry)} style={{ padding: "4px 12px", borderRadius: 8, border: `1px solid ${C}44`, background: "transparent", color: C, cursor: "pointer", fontSize: 12 }}>✏️ Modifica</button>
        <button onClick={() => { onDelete(entry.id); setSelRace(null); }} style={{ padding: "4px 12px", borderRadius: 8, border: "1px solid rgba(239,68,68,0.3)", background: "transparent", color: "#ef4444", cursor: "pointer", fontSize: 12 }}>🗑 Elimina</button>
      </div>}
      <div style={{ padding: "28px 36px 24px", background: `linear-gradient(135deg,${BG},rgba(15,15,26,0.95))`, borderBottom: `1px solid ${C}22`, position: "relative", overflow: "hidden", flexShrink: 0 }}>
        <div style={{ position: "absolute", top: -40, right: -20, fontSize: 120, opacity: 0.05, color: C }}>{icona}</div>
        <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 10 }}>
          <div style={{ width: 52, height: 52, borderRadius: 12, background: BG, border: `1px solid ${C}55`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, color: C, boxShadow: `0 0 20px ${GLOW}` }}>{icona}</div>
          <div><div style={{ fontSize: 10, color: C, letterSpacing: 3, textTransform: "uppercase", marginBottom: 4 }}>{meta ? meta.short : "Razza"}</div><h1 style={{ margin: 0, fontSize: 24, fontWeight: 900, color: "#e2d9f3" }}>{meta ? meta.nome : entry.title}</h1></div>
        </div>
        {meta && <p style={{ margin: "0 0 10px", fontSize: 13, color: `${C}cc`, fontStyle: "italic", paddingLeft: 12, borderLeft: `2px solid ${C}55` }}>{meta.motto}</p>}
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "24px 36px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(210px,1fr))", gap: 14 }}>
          {allS.map((sec, i) => <button key={i} onClick={() => setSelSec(sec)} style={{ textAlign: "left", padding: "18px 20px", borderRadius: 12, border: sec.secret ? `1px solid ${C}55` : `1px solid ${C}22`, background: sec.secret ? `${C}10` : "rgba(255,255,255,0.03)", cursor: "pointer", color: "#e2d9f3", transition: "all 0.2s" }} onMouseEnter={el => { el.currentTarget.style.background = `${C}15`; el.currentTarget.style.transform = "translateY(-2px)"; }} onMouseLeave={el => { el.currentTarget.style.background = sec.secret ? `${C}10` : "rgba(255,255,255,0.03)"; el.currentTarget.style.transform = "translateY(0)"; }}>
            <div style={{ fontSize: 18, marginBottom: 8 }}>{sec.secret ? "🔐" : icona}</div>

          </button>)}
        </div>
      </div>
    </div>
  );
}

// ── SEZIONE PNG ────────────────────────────────────────────────────────────────
const STATUS_CFG = { alleato: { label: "Alleato", color: "#22c55e", icon: "🟢" }, neutrale: { label: "Neutrale", color: "#f59e0b", icon: "🟡" }, nemico: { label: "Nemico", color: "#ef4444", icon: "🔴" }, sconosciuto: { label: "Sconosciuto", color: "#6d5fa0", icon: "⚪" } };

                </div>
              </div>
            </div>
            <MD text={e.public_content} accentColor={C} />
            {isMaster && e.private_content && <PrivateBox content={e.private_content} accent={C} />}

          })}
        </div>
      </div>
    </div>
  );

function DiarioSection({ isMaster, player, allPgEntries }) {
  const [voci, setVoci] = useState([]);
  const [selPlayer, setSelPlayer] = useState(isMaster ? "tutti" : player?.username);
  const [writing, setWriting] = useState(false);
  const [testo, setTesto] = useState("");
  const [sessione, setSessione] = useState("");
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    setLoading(true);
    let q = sb.from("diario").select("*").order("created_at", { ascending: false });
    if (!isMaster) q = q.eq("player_username", player?.username);
    q.then(({ data }) => { setVoci(data || []); setLoading(false); });
  }, [isMaster, player?.username]);

  async function submitVoce() {
    if (!testo.trim()) return;
    const { data } = await sb.from("diario").insert({ player_username: player.username, testo: testo.trim(), sessione, stato: isMaster ? "approved" : "pending" }).select().single();
    if (data) setVoci(prev => [data, ...prev]);
    setTesto(""); setSessione(""); setWriting(false);
  }
  async function approva(id) { await sb.from("diario").update({ stato: "approved" }).eq("id", id); setVoci(prev => prev.map(v => v.id === id ? { ...v, stato: "approved" } : v)); }
  async function elimina(id) { await sb.from("diario").delete().eq("id", id); setVoci(prev => prev.filter(v => v.id !== id)); }

  const pendingVoci = isMaster ? voci.filter(v => v.stato === "pending") : [];
  const approvedVoci = voci.filter(v => v.stato === "approved" && (selPlayer === "tutti" || v.player_username === selPlayer));

  const getPgName = (username) => {
    const pg = allPgEntries.find(e => e.extra?.owner === username);
    return pg ? pg.title : username;

    <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>

              <div style={{ fontSize: 12, color: "#c8bfe8" }}>{v.testo}</div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => approva(v.id)} style={{ padding: "4px 10px", borderRadius: 8, border: "none", background: "#22c55e", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 11 }}>✓</button>
              <button onClick={() => elimina(v.id)} style={{ padding: "4px 10px", borderRadius: 8, border: "none", background: "#ef4444", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 11 }}>✕</button>
            </div>
          </div>)}
        </div>
      )}
      <div style={{ padding: "10px 20px", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", flexShrink: 0 }}>
        {isMaster && <>
          <button onClick={() => setSelPlayer("tutti")} style={{ padding: "4px 12px", borderRadius: 20, border: `1px solid ${selPlayer === "tutti" ? "#a78bfa88" : "#a78bfa33"}`, background: selPlayer === "tutti" ? "rgba(167,139,250,0.15)" : "transparent", color: selPlayer === "tutti" ? "#a78bfa" : "#6d5fa0", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>📓 Tutti</button>
          {PLAYERS_DEFAULT.map(p => <button key={p.username} onClick={() => setSelPlayer(p.username)} style={{ padding: "4px 12px", borderRadius: 20, border: `1px solid ${selPlayer === p.username ? "#a78bfa88" : "#a78bfa33"}`, background: selPlayer === p.username ? "rgba(167,139,250,0.15)" : "transparent", color: selPlayer === p.username ? "#a78bfa" : "#6d5fa0", fontSize: 11, fontWeight: 600, cursor: "pointer", textTransform: "capitalize" }}>{p.username}</button>)}

        {!isMaster && !writing && <button onClick={() => setWriting(true)} style={{ marginLeft: "auto", padding: "6px 14px", borderRadius: 8, border: "none", background: "linear-gradient(90deg,#7c3aed,#a855f7)", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>✍️ Scrivi</button>}

      {writing && !isMaster && (

          <textarea value={testo} onChange={e => setTesto(e.target.value)} placeholder="Scrivi in prima persona..." style={{ width: "100%", height: 120, padding: 12, borderRadius: 10, border: "1px solid rgba(167,139,250,0.3)", background: "rgba(167,139,250,0.05)", color: "#e2d9f3", fontSize: 13, lineHeight: 1.6, resize: "vertical", boxSizing: "border-box" }} />

        </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>

          <div style={{ maxWidth: 760, margin: "0 auto", display: "flex", flexDirection: "column", gap: 16 }}>
            {approvedVoci.map(v => <div key={v.id} style={{ padding: "18px 22px", borderRadius: 12, background: "rgba(167,139,250,0.05)", border: "1px solid rgba(167,139,250,0.15)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: "rgba(167,139,250,0.15)", border: "1px solid rgba(167,139,250,0.3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>⚔️</div>

                  <div style={{ fontSize: 12, fontWeight: 700, color: "#a78bfa", textTransform: "capitalize" }}>{v.player_username}</div>

// ── EDITOR VOCI ────────────────────────────────────────────────────────────────
function EntryEditor({ entry, activeSection, onSave, onCancel, accent }) {
  const [e, setE] = useState({ title: "", public_content: "", private_content: "", extra: {}, ...entry });
  const [loading, setLoading] = useState(false);
  const upd = (k, v) => setE(p => ({ ...p, [k]: v }));
  const updExtra = (k, v) => setE(p => ({ ...p, extra: { ...p.extra, [k]: v } }));

  async function handleFile(ev) {
    const f = ev.target.files?.[0]; if (!f) return; setLoading(true);
    try { const text = await readFile(f); upd("public_content", text); if (!e.title) upd("title", f.name.replace(/\.[^.]+$/, "")); }
    catch (err) { alert(`Errore: ${err.message}`); } setLoading(false); ev.target.value = "";
  }

  const isPng = activeSection === "png";
  const isPg = activeSection === "pg";

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin, masterPwd }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  async function handleLogin() {
    if (!username.trim() || !password.trim()) return;
    setLoading(true); setError("");
    const u = username.trim().toLowerCase();
    if (u === MASTER_USER) {
      const stored = localStorage.getItem(MASTER_PWD_KEY) || "lassoluto";
      if (password === stored) { onLogin({ username: MASTER_USER, isMaster: true }); }
      else { setError("Password errata!"); }
      setLoading(false); return;
    }
    const { data, error: err } = await sb.from("players").select("*").eq("username", u).single();
    if (err || !data) { setError("Giocatore non trovato."); setLoading(false); return; }
    if (data.password !== password) { setError("Password errata!"); setLoading(false); return; }
    onLogin({ username: u, razza: data.razza, isMaster: false, id: data.id });
    setLoading(false);
  }

  return (
    <div style={{ background: "linear-gradient(135deg,#0f0f1a,#1a0a2e)", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Segoe UI',sans-serif" }}>
      <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 16, padding: 40, width: 340, textAlign: "center" }}>
        <div style={{ fontSize: 48, marginBottom: 8 }}>🌌</div>
        <h1 style={{ color: "#e2d9f3", fontSize: 22, fontWeight: 700, margin: "0 0 4px" }}>Dark Matter</h1>
        <p style={{ color: "#8b7aa8", fontSize: 13, margin: "0 0 28px" }}>Il Nucleo Gemino</p>
        <div style={{ textAlign: "left" }}>
          <label style={{ fontSize: 12, color: "#8b7aa8", display: "block", marginBottom: 6 }}>Nome utente</label>
          <input value={username} onChange={e => setUsername(e.target.value)} placeholder="es. fabio" onKeyDown={e => e.key === "Enter" && handleLogin()} style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.07)", color: "#fff", fontSize: 14, boxSizing: "border-box", marginBottom: 12 }} />
          <label style={{ fontSize: 12, color: "#8b7aa8", display: "block", marginBottom: 6 }}>Password</label>
          <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Password..." onKeyDown={e => e.key === "Enter" && handleLogin()} style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.07)", color: "#fff", fontSize: 14, boxSizing: "border-box", marginBottom: 16 }} />
          {error && <div style={{ fontSize: 12, color: "#ef4444", marginBottom: 12, textAlign: "center" }}>{error}</div>}
          <button onClick={handleLogin} disabled={loading} style={{ width: "100%", padding: "12px 0", borderRadius: 8, border: "none", background: "linear-gradient(90deg,#7c3aed,#a855f7)", color: "#fff", fontWeight: 700, cursor: loading ? "wait" : "pointer", fontSize: 14, opacity: loading ? 0.7 : 1 }}>
            {loading ? "⏳ Accesso..." : "🚀 Entra"}
          </button>
        </div>
        <p style={{ marginTop: 20, fontSize: 11, color: "#3a3a5a" }}>L'Assoluto: username "lassoluto"</p>
      </div>
    </div>
  );
}

// ── CAMBIO PASSWORD ───────────────────────────────────────────────────────────
function CambioPasswordModal({ username, isMaster, onClose }) {
  const [oldPwd, setOldPwd] = useState(""), [newPwd, setNewPwd] = useState(""), [confirm, setConfirm] = useState(""), [msg, setMsg] = useState("");

  async function change() {
    if (!oldPwd || !newPwd || !confirm) { setMsg("Compila tutti i campi."); return; }
    if (newPwd !== confirm) { setMsg("Le password non coincidono."); return; }
    if (newPwd.length < 4) { setMsg("Password troppo corta (min 4 caratteri)."); return; }
    if (isMaster) {
      const stored = localStorage.getItem(MASTER_PWD_KEY) || "lassoluto";
      if (oldPwd !== stored) { setMsg("Password attuale errata."); return; }
      localStorage.setItem(MASTER_PWD_KEY, newPwd);
      setMsg("✅ Password cambiata!"); setTimeout(onClose, 1500);
    } else {
      const { data } = await sb.from("players").select("password").eq("username", username).single();
      if (!data || data.password !== oldPwd) { setMsg("Password attuale errata."); return; }
      await sb.from("players").update({ password: newPwd }).eq("username", username);
      setMsg("✅ Password cambiata!"); setTimeout(onClose, 1500);
    }
  }

  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
      <div style={{ background: "#12122a", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 16, padding: 32, width: 320 }}>
        <h2 style={{ margin: "0 0 20px", fontSize: 16, fontWeight: 700, color: "#e2d9f3" }}>🔑 Cambia Password</h2>
        {[["Password attuale", oldPwd, setOldPwd], ["Nuova password", newPwd, setNewPwd], ["Conferma nuova", confirm, setConfirm]].map(([label, val, set]) => (
          <div key={label} style={{ marginBottom: 12 }}>
            <label style={{ fontSize: 12, color: "#8b7aa8", display: "block", marginBottom: 4 }}>{label}</label>
            <input type="password" value={val} onChange={e => set(e.target.value)} style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.05)", color: "#fff", fontSize: 13, boxSizing: "border-box" }} />
          </div>
        ))}
        {msg && <div style={{ fontSize: 12, color: msg.startsWith("✅") ? "#22c55e" : "#ef4444", marginBottom: 12 }}>{msg}</div>}
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={change} style={{ flex: 1, padding: "10px 0", borderRadius: 8, border: "none", background: "linear-gradient(90deg,#7c3aed,#a855f7)", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13 }}>Cambia</button>
          <button onClick={onClose} style={{ padding: "10px 16px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.12)", background: "transparent", color: "#8b7aa8", cursor: "pointer", fontSize: 13 }}>Annulla</button>
        </div>
      </div>
    </div>
  );
}

// ── APP PRINCIPALE ────────────────────────────────────────────────────────────
  function App() {
  const [session, setSession] = useState(null);
  const [activeSection, setActiveSection] = useState("razze");
  const [entries, setEntries] = useState({});
  const [editingEntry, setEditingEntry] = useState(null);
  const [view, setView] = useState("section");
  const [players, setPlayers] = useState([]);
  const [unlocks, setUnlocks] = useState({});
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [saved, setSaved] = useState(false);
  const [showPwdModal, setShowPwdModal] = useState(false);
  const [loading, setLoading] = useState(true);

  // Carica sessione salvata
  useEffect(() => {
    const s = sessionStorage.getItem(SESSION_KEY);
    if (s) { try { setSession(JSON.parse(s)); } catch {} }
    setLoading(false);
  }, []);

  // Carica dati quando loggato
  useEffect(() => {
    if (!session) return;
    loadAll();
  }, [session]);

  async function loadAll() {
    const [{ data: entriesData }, { data: playersData }, { data: unlocksData }] = await Promise.all([
      sb.from("entries").select("*").order("created_at"),
      sb.from("players").select("*"),
      sb.from("race_unlocks").select("*"),
    ]);

    const entriesBySec = {};
    (entriesData || []).forEach(e => {
      if (!entriesBySec[e.section]) entriesBySec[e.section] = [];
      entriesBySec[e.section].push(e);
    });
    setEntries(entriesBySec);
    setPlayers(playersData || []);

    // Sblocchi per giocatore: { username: [razza_id, ...] }
    const unlockMap = {};
    (unlocksData || []).forEach(u => {
      if (!unlockMap[u.player_username]) unlockMap[u.player_username] = [];
      unlockMap[u.player_username].push(u.razza_id);
    });
    setUnlocks(unlockMap);
  }

  function handleLogin(userData) {
    setSession(userData);
    sessionStorage.setItem(SESSION_KEY, JSON.stringify(userData));
  }
  function handleLogout() {
    setSession(null);
    sessionStorage.removeItem(SESSION_KEY);
    setEntries({}); setView("section");
  }

  async function saveEntry(entry) {
    const isNew = !entry.id;
    const payload = { section: activeSection, title: entry.title, public_content: entry.public_content, private_content: entry.private_content, extra: entry.extra || {} };
    let saved_entry;
    if (isNew) {
      const id = mkId();
      const { data } = await sb.from("entries").insert({ id, ...payload }).select().single();
      saved_entry = data;
    } else {
      const { data } = await sb.from("entries").update(payload).eq("id", entry.id).select().single();
      saved_entry = data;
    }
    if (saved_entry) {
      setEntries(prev => {
        const list = prev[activeSection] || [];
        const idx = list.findIndex(e => e.id === saved_entry.id);
        return { ...prev, [activeSection]: idx >= 0 ? list.map(e => e.id === saved_entry.id ? saved_entry : e) : [...list, saved_entry] };
      });
    }
    setSaved(true); setTimeout(() => setSaved(false), 1500);
    setView("section"); setEditingEntry(null);
  }

  async function deleteEntry(id) {
    await sb.from("entries").delete().eq("id", id);
    setEntries(prev => {
      const updated = { ...prev };
      updated[activeSection] = (updated[activeSection] || []).filter(e => e.id !== id);
      return updated;
    });
  }

  async function createPlayer(username, razza, password) {
    const { data } = await sb.from("players").insert({ username, razza, password }).select().single();
    if (data) setPlayers(prev => [...prev, data]);
  }
  async function resetPassword(username, newPwd) {
    await sb.from("players").update({ password: newPwd }).eq("username", username);
    alert(`✅ Password di ${username} aggiornata!`);
  }

  async function handleUnlock(username, razzaId, unlock) {
    if (unlock) {
      await sb.from("race_unlocks").insert({ player_username: username, razza_id: razzaId });
      setUnlocks(prev => ({ ...prev, [username]: [...(prev[username] || []), razzaId] }));
    } else {
      await sb.from("race_unlocks").delete().eq("player_username", username).eq("razza_id", razzaId);
      setUnlocks(prev => ({ ...prev, [username]: (prev[username] || []).filter(r => r !== razzaId) }));
    }
  }

  if (loading) return <div style={{ background: "#0f0f1a", height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontFamily: "sans-serif" }}>🌌 Caricamento...</div>;
  if (!session) return <LoginScreen onLogin={handleLogin} />;

  const isMaster = session.isMaster;
  const accent = isMaster ? "#7c3aed" : "#0ea5e9";
  const curSec = SECTIONS.find(s => s.id === activeSection);
  const sectionEntries = entries[activeSection] || [];
  const pgEntries = entries["pg"] || [];
  const playerUnlocks = isMaster ? unlocks : (unlocks[session.username] || []);

  const PRIVATE_SECTIONS = ["campagna","png","fazioni","eventi","missioni"];
  const SPECIAL_SECTIONS = ["razze","storia","campagna","pg","png","artefatti","missioni","diario"];

  const sidebarExtras = [
    ...(isMaster ? [{ id: "giocatori", icon: "👥", label: "Gestione Giocatori", color: "#22c55e" }] : []),
    { id: "pwd", icon: "🔑", label: "Cambia Password", color: "#f59e0b" },
    { id: "logout", icon: "🚪", label: "Esci", color: "#8b7aa8" }
  ];

  return (
    <div style={{ display: "flex", height: "100vh", background: "#0f0f1a", fontFamily: "'Segoe UI',sans-serif", color: "#e2d9f3", overflow: "hidden" }}>
      {showPwdModal && <CambioPasswordModal username={session.username} isMaster={isMaster} onClose={() => setShowPwdModal(false)} />}

      {/* Sidebar */}
      <div style={{ width: sidebarOpen ? 230 : 56, transition: "width 0.2s", background: "#12122a", borderRight: "1px solid rgba(255,255,255,0.07)", display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ padding: "16px 12px", display: "flex", alignItems: "center", gap: 8, borderBottom: "1px solid rgba(255,255,255,0.07)" }}>
          <button onClick={() => setSidebarOpen(v => !v)} style={{ background: "none", border: "none", color: "#8b7aa8", cursor: "pointer", fontSize: 18, padding: 0 }}>☰</button>
          {sidebarOpen && <span style={{ fontSize: 13, fontWeight: 700, color: accent }}>🌌 Dark Matter</span>}
        </div>
        {sidebarOpen && (
          <div style={{ margin: "10px 10px 0", padding: "6px 10px", borderRadius: 8, background: isMaster ? "rgba(124,58,237,0.15)" : "rgba(14,165,233,0.15)", border: `1px solid ${accent}30`, fontSize: 11, fontWeight: 700, color: accent, textAlign: "center", textTransform: "capitalize" }}>
            {isMaster ? "⚙️ L'ASSOLUTO" : `👤 ${session.username}`}
          </div>
        )}
        <nav style={{ flex: 1, overflowY: "auto", padding: "8px 6px" }}>
          {SECTIONS.map(sec => { const active = activeSection === sec.id && view === "section"; return <button key={sec.id} onClick={() => { setActiveSection(sec.id); setView("section"); }} style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "9px 8px", borderRadius: 8, border: "none", background: active ? `${accent}20` : "transparent", color: active ? accent : "#8b7aa8", cursor: "pointer", fontSize: 13, fontWeight: active ? 700 : 400, textAlign: "left", marginBottom: 2 }}><span style={{ fontSize: 16, flexShrink: 0 }}>{sec.icon}</span>{sidebarOpen && <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{sec.label}</span>}</button>; })}
        </nav>
        <div style={{ padding: "10px 6px", borderTop: "1px solid rgba(255,255,255,0.07)" }}>
          {sidebarExtras.map(item => <button key={item.id} onClick={() => { if (item.id === "logout") handleLogout(); else if (item.id === "pwd") setShowPwdModal(true); else { setView(item.id); } }} style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "9px 8px", borderRadius: 8, border: "none", background: view === item.id ? `${item.color}20` : "transparent", color: view === item.id ? item.color : "#8b7aa8", cursor: "pointer", fontSize: 13, fontWeight: 600, marginBottom: 2 }}><span style={{ fontSize: 16 }}>{item.icon}</span>{sidebarOpen && item.label}</button>)}
        </div>
      </div>

      {/* Main */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {/* Header */}
        <div style={{ padding: "14px 24px", borderBottom: "1px solid rgba(255,255,255,0.07)", display: "flex", alignItems: "center", justifyContent: "space-between", background: "#12122a", flexShrink: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 20 }}>{view === "giocatori" ? "👥" : view === "edit" ? "✏️" : curSec?.icon}</span>
            <h2 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>{view === "giocatori" ? "Gestione Giocatori" : view === "edit" ? "Modifica Voce" : curSec?.label}</h2>
            {saved && <span style={{ fontSize: 11, color: "#10b981", fontWeight: 600 }}>✓ Salvato</span>}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            {view === "section" && isMaster && !["storia","diario","artefatti"].includes(activeSection) && (
              <button onClick={() => { setEditingEntry({ title: "", public_content: "", private_content: "", extra: {} }); setView("edit"); }} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: `linear-gradient(90deg,${accent},#a855f7)`, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13 }}>+ Aggiungi</button>
            )}
            {view === "edit" && <button onClick={() => { setView("section"); setEditingEntry(null); }} style={{ padding: "7px 14px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "transparent", color: "#8b7aa8", cursor: "pointer", fontSize: 13 }}>← Indietro</button>}
            {view === "giocatori" && <button onClick={() => setView("section")} style={{ padding: "7px 14px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "transparent", color: "#8b7aa8", cursor: "pointer", fontSize: 13 }}>← Indietro</button>}
          </div>
        </div>

        {/* Content */}
        <div style={{ flex: 1, overflow: "hidden", display: "flex" }}>
          {view === "giocatori" && isMaster && <GiocatoriManager players={players} onCreatePlayer={createPlayer} onResetPassword={resetPassword} />}

          {view === "edit" && isMaster && (
            <div style={{ flex: 1, overflowY: "auto", padding: 24 }}>
              <EntryEditor entry={editingEntry} activeSection={activeSection} onSave={saveEntry} onCancel={() => { setView("section"); setEditingEntry(null); }} accent={accent} />
            </div>
          )}

          {view === "section" && activeSection === "razze" && (
            <RazzeSection entries={sectionEntries} isMaster={isMaster} player={session} unlocks={isMaster ? unlocks : playerUnlocks} onEdit={e => { setEditingEntry(e); setView("edit"); }} onDelete={deleteEntry} onUnlock={handleUnlock} />
          )}
          {view === "section" && activeSection === "storia" && <TimelineView entries={sectionEntries} isMaster={isMaster} onAdd={() => { setEditingEntry(null); setView("edit"); }} onDelete={deleteEntry} />}
          {view === "section" && activeSection === "campagna" && <GenericDualSection entries={sectionEntries} isMaster={isMaster} accent="#a78bfa" sectionIcon="🌌" sectionLabel="Campagna" onEdit={e => { setEditingEntry(e); setView("edit"); }} onDelete={deleteEntry} />}
          {view === "section" && activeSection === "pg" && <PgSection entries={sectionEntries} isMaster={isMaster} player={session} onEdit={e => { setEditingEntry(e); setView("edit"); }} onDelete={deleteEntry} />}
          {view === "section" && activeSection === "png" && <PngSection entries={sectionEntries} isMaster={isMaster} onEdit={e => { setEditingEntry(e); setView("edit"); }} onDelete={deleteEntry} />}
          {view === "section" && activeSection === "artefatti" && <ArtefattiSection entries={sectionEntries} isMaster={isMaster} player={session} allPlayers={PLAYERS_DEFAULT} onEdit={e => { setEditingEntry(e); setView("edit"); }} onDelete={deleteEntry} />}
          {view === "section" && activeSection === "fazioni" && <GenericDualSection entries={sectionEntries} isMaster={isMaster} accent="#f472b6" sectionIcon="🕸️" sectionLabel="Sottofazioni & Sottotrame" onEdit={e => { setEditingEntry(e); setView("edit"); }} onDelete={deleteEntry} />}
          {view === "section" && activeSection === "eventi" && <GenericDualSection entries={sectionEntries} isMaster={isMaster} accent="#f59e0b" sectionIcon="⚡" sectionLabel="Eventi Importanti" onEdit={e => { setEditingEntry(e); setView("edit"); }} onDelete={deleteEntry} />}
          {view === "section" && activeSection === "missioni" && <MissioniSection entries={sectionEntries} isMaster={isMaster} player={session} onEdit={e => { setEditingEntry(e); setView("edit"); }} onDelete={deleteEntry} />}
          {view === "section" && activeSection === "diario" && <DiarioSection isMaster={isMaster} player={session} allPgEntries={pgEntries} />}
          {view === "section" && activeSection === "manuale" && <GenericDualSection entries={sectionEntries} isMaster={isMaster} accent="#00b4d8" sectionIcon="📖" sectionLabel="Manuale" onEdit={e => { setEditingEntry(e); setView("edit"); }} onDelete={deleteEntry} />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
