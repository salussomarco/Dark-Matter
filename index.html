async function loadPdfJs() {
  if (window.pdfjsLib) return window.pdfjsLib;
  await new Promise((res, rej) => { const s = document.createElement("script"); s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"; s.onload = res; s.onerror = rej; document.head.appendChild(s); });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  return window.pdfjsLib;
}
async function extractPdf(file) {
  const lib = await loadPdfJs(), pdf = await lib.getDocument({ data: await file.arrayBuffer() }).promise;
  let txt = "";
  for (let i = 1; i <= pdf.numPages; i++) { const pg = await pdf.getPage(i), c = await pg.getTextContent(); txt += c.items.map(x => x.str).join(" ") + "\n\n"; }
  return txt.trim();
}
const readFile = (f) => (f.name.toLowerCase().endsWith(".pdf") || f.type === "application/pdf") ? extractPdf(f) : f.text();

function parseSections(text) {
  if (!text) return [];
  const clean = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  if (clean.includes("===")) {
    const secs = [], parts = clean.split(/===([^=\r\n]+)===/);
    for (let i = 1; i < parts.length; i += 2) {
      const titolo = parts[i].trim(), contenuto = (parts[i + 1] || "").trim().replace(/###([^#\r\n]+)###/g, "\n### $1\n");
      if (titolo && contenuto) secs.push({ titolo, contenuto });
    }
    if (secs.length) return secs;
  }
  let t = clean.replace(/[ \t]{2,}/g, " ").trim();
  const secs = [], matches = [];
  const pat = /(?:^|\n)(Macrogruppo\s*\d+\s*[–—-]+\s*[^\n]+|[A-Z][A-Z\s,àèéìòù]{3,60})(?=\n)/g;
  let m; while ((m = pat.exec(t)) !== null) matches.push({ index: m.index, title: m[1].trim() });
  if (!matches.length) { secs.push({ titolo: "Descrizione", contenuto: fixText(t) }); }
  else { for (let i = 0; i < matches.length; i++) { const start = matches[i].index + matches[i].title.length, end = i + 1 < matches.length ? matches[i + 1].index : t.length, contenuto = t.slice(start, end).trim(), titolo = matches[i].title.replace(/^Macrogruppo\s*\d+\s*[–—-]+\s*/i, "").trim(); if (contenuto) secs.push({ titolo, contenuto: fixText(contenuto) }); } }
  return secs.length ? secs : [{ titolo: "Descrizione", contenuto: fixText(t) }];
}

function MD({ text, accentColor: accent = "#a78bfa" }) {
  if (!text) return null;
  const lines = text.split("\n"), els = [];
  let i = 0;
  while (i < lines.length) {
    const l = lines[i];
    if (/^### /.test(l)) { els.push(<h4 key={i} style={{ margin: "20px 0 8px", fontSize: 12, fontWeight: 700, color: accent, textTransform: "uppercase", letterSpacing: "1.5px", borderBottom: `1px solid ${accent}33`, paddingBottom: 5 }}>{l.slice(4)}</h4>); i++; }
    else if (/^## /.test(l)) { els.push(<h3 key={i} style={{ margin: "22px 0 8px", fontSize: 15, fontWeight: 700, color: accent }}>{l.slice(3)}</h3>); i++; }
    else if (/^# /.test(l)) { els.push(<h2 key={i} style={{ margin: "0 0 16px", fontSize: 20, fontWeight: 800, color: "#e2d9f3" }}>{l.slice(2)}</h2>); i++; }
    else if (/^---+$/.test(l.trim())) { els.push(<hr key={i} style={{ border: "none", borderTop: `1px solid ${accent}33`, margin: "16px 0" }} />); i++; }
    else if (/^[-*•] /.test(l)) { const items = []; while (i < lines.length && /^[-*•] /.test(lines[i])) { items.push(lines[i].replace(/^[-*•] /, "")); i++; } els.push(<ul key={i} style={{ margin: "8px 0", paddingLeft: 20 }}>{items.map((it, j) => <li key={j} style={{ fontSize: 13, color: "#c8bfe8", lineHeight: 1.75, marginBottom: 3 }} dangerouslySetInnerHTML={{ __html: inlineFmt(it) }} />)}</ul>); }
    else if (/^\d+\. /.test(l)) { const items = []; while (i < lines.length && /^\d+\. /.test(lines[i])) { items.push(lines[i].replace(/^\d+\. /, "")); i++; } els.push(<ol key={i} style={{ margin: "8px 0", paddingLeft: 20 }}>{items.map((it, j) => <li key={j} style={{ fontSize: 13, color: "#c8bfe8", lineHeight: 1.75, marginBottom: 3 }} dangerouslySetInnerHTML={{ __html: inlineFmt(it) }} />)}</ol>); }
    else if (l.trim() === "") { els.push(<div key={i} style={{ height: 8 }} />); i++; }
    else { let block = ""; while (i < lines.length && lines[i].trim() !== "" && !/^[#\-*•]/.test(lines[i]) && !/^\d+\. /.test(lines[i]) && !/^---+$/.test(lines[i].trim())) { block += (block ? " " : "") + lines[i]; i++; } els.push(<p key={i} style={{ margin: "0 0 12px", fontSize: 13.5, color: "#c8bfe8", lineHeight: 1.85 }} dangerouslySetInnerHTML={{ __html: inlineFmt(block) }} />); }
  }
  return <div>{els}</div>;
}

function parseAnnoMAW(raw) {
  if (!raw) return null;
  const s = raw.trim();
  const bmaw = s.match(/^([\d.,]+)\s*BMAW$/i);
  if (bmaw) return -parseFloat(bmaw[1].replace(/\./g, "").replace(",", "."));
  const maw = s.match(/^(?:anno\s+)?([\d.,]+)\s*(?:MAW)?$/i);
  if (maw) return parseFloat(maw[1].replace(/\./g, "").replace(",", "."));
  return null;
}
function parseTimeline(text) {
  if (!text) return { epoche: [] };
  const lines = text.split("\n");
  let curEpoca = null, curEvento = null;
  const epoche = [];
  const pushEvento = () => { if (curEvento && curEpoca) curEpoca.eventi.push(curEvento); curEvento = null; };
  const pushEpoca = () => { pushEvento(); if (curEpoca) epoche.push(curEpoca); curEpoca = null; };
  for (const raw of lines) {
    const l = raw.trim();
    const epocaM = l.match(/^===(.+)===$/);
    if (epocaM) {
      pushEpoca();
      const titolo = epocaM[1].replace(/^[⬛🟥🟦🟩🟨🟪🔶🔷◼◻▪▫]\s*/u, "").trim();
      const rangeM = titolo.match(/([\d.,]+)\s*(?:–|—|-)\s*([\d.,]+)\s*(BMAW|MAW)/i);
      let annoInizio = null, annoFine = null;
      if (rangeM) { const era = rangeM[3].toUpperCase(), a = parseFloat(rangeM[1].replace(/\./g, "")), b = parseFloat(rangeM[2].replace(/\./g, "")); annoInizio = era === "BMAW" ? -Math.max(a, b) : Math.min(a, b); annoFine = era === "BMAW" ? -Math.min(a, b) : Math.max(a, b); }
      curEpoca = { titolo, annoInizio, annoFine, eventi: [] };
      continue;
    }
    const evM = l.match(/^###(.+)###$/);
    if (evM) {
      pushEvento();
      const inner = evM[1].trim(), sepM = inner.match(/^(.+?)\s*[·•]\s*(.+)$/);
      let annoRaw = "", titolo = inner;
      if (sepM) { annoRaw = sepM[1].trim(); titolo = sepM[2].trim(); }
      if (!curEpoca) curEpoca = { titolo: "Eventi", annoInizio: null, annoFine: null, eventi: [] };
      curEvento = { titolo, annoRaw, anno: parseAnnoMAW(annoRaw), razza: "", descrizione: "" };
      continue;
    }
    if (curEvento) {
      const razzaM = l.match(/^\*\*(.+?)\*\*\s*(?:—|-|–)?\s*(.*)/);
      if (razzaM && !curEvento.razza) { curEvento.razza = razzaM[1]; if (razzaM[2]) curEvento.descrizione += razzaM[2] + " "; }
      else if (l) curEvento.descrizione += l + " ";
    }
  }
  pushEpoca();
  return { epoche };
}

function PgSection({ entries, isMaster, onEdit, onDelete }) {
  const [selPg, setSelPg] = useState(null);
  const [presentazioni, setPresentazioni] = useState({});
  const [pending, setPending] = useState({});
  const [writing, setWriting] = useState(false);
  const [draft, setDraft] = useState("");
  const [ready, setReady] = useState(false);
  const [selectMode, setSelectMode] = useState(false);
  const [selected, setSelected] = useState(new Set());
  const [confirmDel, setConfirmDel] = useState(false);

  useEffect(() => {
    async function load() {
      try {
        const raw = localStorage.getItem(PG_PRES_KEY);
        if (raw) { const p = JSON.parse(raw); setPresentazioni(p.approvate || {}); setPending(p.pending || {}); }
      } catch {}
      setReady(true);
    }
    load();
  }, []);

  function saveAll(approvate, pend) {
    try { localStorage.setItem(PG_PRES_KEY, JSON.stringify({ approvate, pending: pend })); } catch {}
  }

  function submitPresentazione(pgId) {
    if (!draft.trim()) return;
    const np = { ...pending, [pgId]: { testo: draft.trim(), createdAt: new Date().toISOString() } };
    setPending(np); saveAll(presentazioni, np); setDraft(""); setWriting(false);
  }
  function approva(pgId) {
    const testo = pending[pgId]?.testo; if (!testo) return;
    const na = { ...presentazioni, [pgId]: testo }, np = { ...pending }; delete np[pgId];
    setPresentazioni(na); setPending(np); saveAll(na, np);
  }
  function rifiuta(pgId) {
    const np = { ...pending }; delete np[pgId]; setPending(np); saveAll(presentazioni, np);
  }
  function toggleSelect(id) { setSelected(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; }); }
  function exitSelect() { setSelectMode(false); setSelected(new Set()); setConfirmDel(false); }
  function deleteSelected() { selected.forEach(id => onDelete(id)); exitSelect(); }

  if (!ready) return <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "#4a4a6a" }}>Caricamento...</div>;
  if (!entries.length) return <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 12, color: "#4a4a6a" }}><span style={{ fontSize: 48 }}>⚔️</span><p style={{ fontSize: 14 }}>{isMaster ? "Nessun PG. Clicca + Aggiungi." : "Nessun personaggio disponibile."}</p></div>;

  if (selPg) {
    const pg = entries.find(e => e.id === selPg);
    if (!pg) { setSelPg(null); return null; }
    const pres = presentazioni[pg.id], pend = pending[pg.id], secs = parseSections(pg.publicContent);
    return (
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{ padding: "12px 28px", borderBottom: "1px solid rgba(167,139,250,0.2)", display: "flex", alignItems: "center", gap: 10, background: "rgba(167,139,250,0.05)" }}>
          <button onClick={() => { setSelPg(null); setWriting(false); setDraft(""); }} style={{ background: "none", border: "none", color: "#6d5fa0", cursor: "pointer", fontSize: 13, padding: 0 }}>⚔️ PG</button>
          <span style={{ color: "#3a3a5a" }}>›</span><span style={{ fontSize: 13, fontWeight: 700, color: "#a78bfa" }}>{pg.title}</span>
          {isMaster && <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
            <button onClick={() => onEdit(pg)} style={{ padding: "4px 12px", borderRadius: 8, border: "1px solid rgba(167,139,250,0.3)", background: "transparent", color: "#a78bfa", cursor: "pointer", fontSize: 12 }}>✏️</button>
            <button onClick={() => { onDelete(pg.id); setSelPg(null); }} style={{ padding: "4px 12px", borderRadius: 8, border: "1px solid rgba(239,68,68,0.3)", background: "transparent", color: "#ef4444", cursor: "pointer", fontSize: 12 }}>🗑</button>
          </div>}
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: "28px 36px" }}>
          <div style={{ maxWidth: 760 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 24, padding: "20px 24px", borderRadius: 14, background: "rgba(167,139,250,0.07)", border: "1px solid rgba(167,139,250,0.2)" }}>
              <div style={{ width: 56, height: 56, borderRadius: 14, background: "rgba(167,139,250,0.15)", border: "1px solid rgba(167,139,250,0.3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28 }}>⚔️</div>
              <div><h1 style={{ margin: 0, fontSize: 22, fontWeight: 900, color: "#e2d9f3" }}>{pg.title}</h1><div style={{ fontSize: 12, color: "#6d5fa0", marginTop: 4 }}>{secs.length} sezioni pubbliche</div></div>
            </div>
            {isMaster && pend && (
              <div style={{ marginBottom: 20, padding: "14px 18px", borderRadius: 12, background: "rgba(245,158,11,0.08)", border: "1px solid rgba(245,158,11,0.25)" }}>
                <div style={{ fontSize: 11, color: "#f59e0b", fontWeight: 700, marginBottom: 8 }}>⏳ PRESENTAZIONE IN ATTESA</div>
                <p style={{ margin: "0 0 12px", fontSize: 13, color: "#c8bfe8", fontStyle: "italic", lineHeight: 1.7 }}>"{pend.testo}"</p>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => approva(pg.id)} style={{ padding: "6px 14px", borderRadius: 8, border: "none", background: "#22c55e", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>✓ Approva</button>
                  <button onClick={() => rifiuta(pg.id)} style={{ padding: "6px 14px", borderRadius: 8, border: "none", background: "#ef4444", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>✕ Rifiuta</button>
                </div>
              </div>
            )}
            <div style={{ marginBottom: 24, padding: "16px 20px", borderRadius: 12, background: "rgba(167,139,250,0.05)", border: "1px solid rgba(167,139,250,0.2)" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                <div style={{ fontSize: 12, color: "#a78bfa", fontWeight: 700, letterSpacing: 1 }}>✍️ PRESENTAZIONE DEL PERSONAGGIO</div>
                {!isMaster && !writing && !pend && <button onClick={() => { setWriting(true); setDraft(pres || ""); }} style={{ padding: "4px 12px", borderRadius: 8, border: "1px solid rgba(167,139,250,0.3)", background: "transparent", color: "#a78bfa", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>{pres ? "✏️ Modifica" : "+ Aggiungi"}</button>}
                {!isMaster && pend && <span style={{ fontSize: 11, color: "#f59e0b" }}>⏳ In attesa di approvazione</span>}
              </div>
              {writing && !isMaster ? (
                <div>
                  <textarea value={draft} onChange={e => setDraft(e.target.value)} placeholder="Scrivi come il tuo personaggio si presenta agli altri..." style={{ width: "100%", height: 140, padding: 12, borderRadius: 10, border: "1px solid rgba(167,139,250,0.3)", background: "rgba(167,139,250,0.06)", color: "#e2d9f3", fontSize: 13, lineHeight: 1.7, resize: "vertical", boxSizing: "border-box" }} />
                  <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                    <button onClick={() => submitPresentazione(pg.id)} disabled={!draft.trim()} style={{ padding: "7px 18px", borderRadius: 8, border: "none", background: draft.trim() ? "linear-gradient(90deg,#7c3aed,#a855f7)" : "#2a2a3a", color: "#fff", fontWeight: 700, cursor: draft.trim() ? "pointer" : "default", fontSize: 12 }}>📨 Invia per approvazione</button>
                    <button onClick={() => { setWriting(false); setDraft(""); }} style={{ padding: "7px 14px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.12)", background: "transparent", color: "#8b7aa8", cursor: "pointer", fontSize: 12 }}>Annulla</button>
                  </div>
                </div>
              ) : pres ? <p style={{ margin: 0, fontSize: 13.5, color: "#c8bfe8", fontStyle: "italic", lineHeight: 1.85 }}>"{pres}"</p>
                : <p style={{ margin: 0, fontSize: 13, color: "#4a4a6a", fontStyle: "italic" }}>Nessuna presentazione ancora.</p>}
            </div>
            {secs.map((sec, i) => <div key={i} style={{ marginBottom: 20 }}>{secs.length > 1 && <h3 style={{ margin: "0 0 10px", fontSize: 13, fontWeight: 700, color: "#a78bfa", textTransform: "uppercase", letterSpacing: 1 }}>{sec.titolo}</h3>}<MD text={sec.contenuto} accentColor="#a78bfa" /></div>)}
            {isMaster && pg.privateContent && <div style={{ marginTop: 24, padding: 16, borderRadius: 12, background: "rgba(124,58,237,0.1)", border: "1px solid rgba(167,139,250,0.25)" }}><div style={{ fontSize: 12, color: "#a78bfa", fontWeight: 700, marginBottom: 8 }}>🔐 Background Segreto (solo Master)</div><MD text={pg.privateContent} accentColor="#a78bfa" /></div>}
          </div>
        </div>
      </div>
    );
  }

  const pendingCount = Object.keys(pending).length;
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
      {isMaster && pendingCount > 0 && <div style={{ padding: "8px 24px", background: "rgba(245,158,11,0.08)", borderBottom: "1px solid rgba(245,158,11,0.2)", fontSize: 12, color: "#f59e0b", fontWeight: 600, flexShrink: 0 }}>⏳ {pendingCount} presentazion{pendingCount === 1 ? "e" : "i"} in attesa</div>}
      <div style={{ flex: 1, overflowY: "auto", padding: "32px 36px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 28, flexWrap: "wrap", gap: 10 }}>
          <p style={{ margin: 0, fontSize: 11, color: "#4a4a6a", textTransform: "uppercase", letterSpacing: "2px" }}>{selectMode ? `${selected.size} selezionat${selected.size === 1 ? "o" : "i"}` : "Personaggi"}</p>
          {isMaster && !selectMode && <button onClick={() => setSelectMode(true)} style={{ padding: "6px 14px", borderRadius: 8, border: "1px solid rgba(239,68,68,0.3)", background: "transparent", color: "#ef4444", fontWeight: 600, cursor: "pointer", fontSize: 12 }}>🗑 Elimina voci</button>}
          {isMaster && selectMode && <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <button onClick={() => setSelected(new Set(entries.map(e => e.id)))} style={{ padding: "5px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "transparent", color: "#8b7aa8", cursor: "pointer", fontSize: 12 }}>Tutti</button>
            <button onClick={() => setSelected(new Set())} style={{ padding: "5px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "transparent", color: "#8b7aa8", cursor: "pointer", fontSize: 12 }}>Nessuno</button>
            {confirmDel ? <><span style={{ fontSize: 12, color: "#ef4444" }}>Eliminare {selected.size}?</span><button onClick={deleteSelected} style={{ padding: "5px 12px", borderRadius: 8, border: "none", background: "#ef4444", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>Sì</button><button onClick={() => setConfirmDel(false)} style={{ padding: "5px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "transparent", color: "#8b7aa8", cursor: "pointer", fontSize: 12 }}>No</button></> : <button onClick={() => selected.size > 0 && setConfirmDel(true)} disabled={selected.size === 0} style={{ padding: "5px 14px", borderRadius: 8, border: "none", background: selected.size > 0 ? "#ef4444" : "#3a2a2a", color: selected.size > 0 ? "#fff" : "#5a3a3a", fontWeight: 700, cursor: selected.size > 0 ? "pointer" : "default", fontSize: 12 }}>🗑 Elimina</button>}
            <button onClick={exitSelect} style={{ padding: "5px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "transparent", color: "#8b7aa8", cursor: "pointer", fontSize: 12 }}>Annulla</button>
          </div>}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(220px,1fr))", gap: 18 }}>
          {entries.map(e => {
            const isSel = selected.has(e.id), hasPend = !!pending[e.id], hasPres = !!presentazioni[e.id];
            return <button key={e.id} onClick={() => selectMode ? toggleSelect(e.id) : setSelPg(e.id)} style={{ textAlign: "left", padding: 0, borderRadius: 14, border: isSel ? "2px solid #ef4444" : "1px solid rgba(167,139,250,0.25)", background: isSel ? "rgba(239,68,68,0.06)" : "#0f0f1a", cursor: "pointer", color: "#e2d9f3", overflow: "hidden", position: "relative", transition: "all 0.2s" }} onMouseEnter={el => { if (!isSel) { el.currentTarget.style.borderColor = "rgba(167,139,250,0.6)"; el.currentTarget.style.transform = "translateY(-3px)"; } }} onMouseLeave={el => { if (!isSel) { el.currentTarget.style.borderColor = "rgba(167,139,250,0.25)"; el.currentTarget.style.transform = "translateY(0)"; } }}>
              {selectMode && <div style={{ position: "absolute", top: 10, right: 10, width: 20, height: 20, borderRadius: 6, border: isSel ? "none" : "2px solid #4a4a6a", background: isSel ? "#ef4444" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, color: "#fff", zIndex: 2 }}>{isSel ? "✓" : ""}</div>}
              {hasPend && isMaster && <div style={{ position: "absolute", top: 10, right: selectMode ? 36 : 10, width: 10, height: 10, borderRadius: "50%", background: "#f59e0b", zIndex: 2 }} />}
              <div style={{ height: 5, background: "linear-gradient(90deg,#7c3aed,#a855f7)" }} />
              <div style={{ padding: "18px 20px 20px" }}>
                <div style={{ width: 44, height: 44, borderRadius: 12, background: "rgba(167,139,250,0.12)", border: "1px solid rgba(167,139,250,0.25)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, marginBottom: 12 }}>⚔️</div>
                <div style={{ fontSize: 15, fontWeight: 800, color: "#e2d9f3", marginBottom: 8 }}>{e.title || "(senza nome)"}</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {hasPres && <span style={{ fontSize: 10, color: "#22c55e", background: "rgba(34,197,94,0.1)", padding: "2px 8px", borderRadius: 10, border: "1px solid rgba(34,197,94,0.2)" }}>✍️ Presentazione</span>}
                  {hasPend && <span style={{ fontSize: 10, color: "#f59e0b", background: "rgba(245,158,11,0.1)", padding: "2px 8px", borderRadius: 10, border: "1px solid rgba(245,158,11,0.2)" }}>⏳ In attesa</span>}
                  {isMaster && e.privateContent && <span style={{ fontSize: 10, color: "#a78bfa", background: "rgba(167,139,250,0.1)", padding: "2px 8px", borderRadius: 10, border: "1px solid rgba(167,139,250,0.2)" }}>🔐 BG</span>}
                </div>
              </div>
            </button>;
          })}
        </div>
      </div>
    </div>
  );
}

function DiarioView({ pgList, isMaster }) {
  const [voci, setVoci] = useState([]);
  const [selPg, setSelPg] = useState("tutti");
  const [writing, setWriting] = useState(false);
  const [form, setForm] = useState({ pgId: "", testo: "", sessione: "" });
  const [ready, setReady] = useState(false);
  const safePgList = Array.isArray(pgList) ? pgList : [];

  useEffect(() => {
    async function load() {
      try { const raw = localStorage.getItem(DIARIO_KEY); if (raw) { const p = JSON.parse(raw); if (Array.isArray(p)) setVoci(p); } } catch {}
      setReady(true);
    }
    load();
  }, []);

  function saveVoci(nv) { setVoci(nv); try { localStorage.setItem(DIARIO_KEY, JSON.stringify(nv)); } catch {} }
  function submitVoce() {
    if (!form.testo.trim() || !form.pgId) return;
    saveVoci([...voci, { id: mkId(), pgId: form.pgId, testo: form.testo.trim(), sessione: form.sessione, createdAt: new Date().toISOString(), stato: "pending" }]);
    setForm({ pgId: "", testo: "", sessione: "" }); setWriting(false);
  }
  function approva(id) { saveVoci(voci.map(v => v.id === id ? { ...v, stato: "approved" } : v)); }
  function rifiuta(id) { saveVoci(voci.filter(v => v.id !== id)); }

  if (!ready) return <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "#4a4a6a" }}>Caricamento...</div>;
  if (!safePgList.length) return <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 12, color: "#4a4a6a" }}><span style={{ fontSize: 48 }}>📓</span><p style={{ fontSize: 14 }}>{isMaster ? "Crea prima i PG nella sezione PG." : "Nessun personaggio disponibile."}</p></div>;

  const pendingVoci = voci.filter(v => v.stato === "pending");
  const approved = voci.filter(v => v.stato === "approved" && (selPg === "tutti" || v.pgId === selPg));

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
      {isMaster && pendingVoci.length > 0 && (
        <div style={{ padding: "10px 20px", borderBottom: "1px solid rgba(245,158,11,0.2)", background: "rgba(245,158,11,0.05)", flexShrink: 0 }}>
          <div style={{ fontSize: 11, color: "#f59e0b", fontWeight: 700, marginBottom: 8, letterSpacing: 1 }}>⏳ IN ATTESA ({pendingVoci.length})</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {pendingVoci.map(v => {
              const pg = safePgList.find(p => p.id === v.pgId);
              return <div key={v.id} style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "10px 14px", borderRadius: 10, background: "rgba(245,158,11,0.08)", border: "1px solid rgba(245,158,11,0.2)" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11, color: "#f59e0b", fontWeight: 700, marginBottom: 3 }}>{pg?.title || "?"} {v.sessione ? `· ${v.sessione}` : ""}</div>
                  <div style={{ fontSize: 12, color: "#c8bfe8", lineHeight: 1.5 }}>{v.testo}</div>
                </div>
                <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                  <button onClick={() => approva(v.id)} style={{ padding: "5px 12px", borderRadius: 8, border: "none", background: "#22c55e", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 11 }}>✓</button>
                  <button onClick={() => rifiuta(v.id)} style={{ padding: "5px 12px", borderRadius: 8, border: "none", background: "#ef4444", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 11 }}>✕</button>
                </div>
              </div>;
            })}
          </div>
        </div>
      )}
      <div style={{ padding: "10px 20px", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", flexShrink: 0 }}>
        <button onClick={() => setSelPg("tutti")} style={{ padding: "4px 12px", borderRadius: 20, border: `1px solid ${selPg === "tutti" ? "#a78bfa88" : "#a78bfa33"}`, background: selPg === "tutti" ? "rgba(167,139,250,0.15)" : "transparent", color: selPg === "tutti" ? "#a78bfa" : "#6d5fa0", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>📓 Tutti</button>
        {safePgList.map(pg => <button key={pg.id} onClick={() => setSelPg(pg.id)} style={{ padding: "4px 12px", borderRadius: 20, border: `1px solid ${selPg === pg.id ? "#a78bfa88" : "#a78bfa33"}`, background: selPg === pg.id ? "rgba(167,139,250,0.15)" : "transparent", color: selPg === pg.id ? "#a78bfa" : "#6d5fa0", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>⚔️ {pg.title}</button>)}
        {!isMaster && !writing && <button onClick={() => setWriting(true)} style={{ marginLeft: "auto", padding: "6px 14px", borderRadius: 8, border: "none", background: "linear-gradient(90deg,#7c3aed,#a855f7)", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>✍️ Scrivi</button>}
      </div>
      {!isMaster && writing && (
        <div style={{ padding: "16px 20px", borderBottom: "1px solid rgba(167,139,250,0.2)", background: "rgba(167,139,250,0.05)", flexShrink: 0 }}>
          <div style={{ display: "flex", gap: 12, marginBottom: 10 }}>
            <select value={form.pgId} onChange={e => setForm(f => ({ ...f, pgId: e.target.value }))} style={{ flex: 1, padding: "8px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.12)", background: "#1a1a35", color: form.pgId ? "#e2d9f3" : "#6d5fa0", fontSize: 13 }}>
              <option value="">Scegli il tuo PG...</option>
              {safePgList.map(p => <option key={p.id} value={p.id}>{p.title}</option>)}
            </select>
            <input value={form.sessione} onChange={e => setForm(f => ({ ...f, sessione: e.target.value }))} placeholder="Sessione (opz.)" style={{ width: 140, padding: "8px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.05)", color: "#e2d9f3", fontSize: 13 }} />
          </div>
          <textarea value={form.testo} onChange={e => setForm(f => ({ ...f, testo: e.target.value }))} placeholder="Scrivi in prima persona..." style={{ width: "100%", height: 120, padding: 12, borderRadius: 10, border: "1px solid rgba(167,139,250,0.3)", background: "rgba(167,139,250,0.05)", color: "#e2d9f3", fontSize: 13, lineHeight: 1.6, resize: "vertical", boxSizing: "border-box" }} />
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <button onClick={submitVoce} disabled={!form.testo.trim() || !form.pgId} style={{ padding: "8px 20px", borderRadius: 8, border: "none", background: form.testo.trim() && form.pgId ? "linear-gradient(90deg,#7c3aed,#a855f7)" : "#2a2a3a", color: "#fff", fontWeight: 700, cursor: form.testo.trim() && form.pgId ? "pointer" : "default", fontSize: 13 }}>📨 Invia</button>
            <button onClick={() => setWriting(false)} style={{ padding: "8px 14px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.12)", background: "transparent", color: "#8b7aa8", cursor: "pointer", fontSize: 13 }}>Annulla</button>
          </div>
        </div>
      )}
      <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>
        {approved.length === 0 && <div style={{ textAlign: "center", color: "#4a4a6a", paddingTop: 60, fontSize: 14 }}>Nessuna voce ancora approvata.</div>}
        <div style={{ maxWidth: 760, margin: "0 auto", display: "flex", flexDirection: "column", gap: 16 }}>
          {approved.map(v => {
            const pg = safePgList.find(p => p.id === v.pgId), d = new Date(v.createdAt);
            return <div key={v.id} style={{ padding: "18px 22px", borderRadius: 12, background: "rgba(167,139,250,0.05)", border: "1px solid rgba(167,139,250,0.15)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: "rgba(167,139,250,0.15)", border: "1px solid rgba(167,139,250,0.3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>⚔️</div>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#a78bfa" }}>{pg?.title || "?"}</div>
                  <div style={{ fontSize: 10, color: "#4a4a6a" }}>{v.sessione && `${v.sessione} · `}{d.toLocaleDateString("it-IT")}</div>
                </div>
                {isMaster && <button onClick={() => rifiuta(v.id)} style={{ marginLeft: "auto", background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 14, padding: 0 }}>🗑</button>}
              </div>
              <p style={{ margin: 0, fontSize: 13.5, color: "#c8bfe8", lineHeight: 1.85, fontStyle: "italic" }}>"{v.testo}"</p>
            </div>;
          })}
        </div>
      </div>
    </div>
  );
}

function RaceGrid({ entries, isMaster, onOpen, onDelete }) {
  const [selectMode, setSelectMode] = useState(false), [selected, setSelected] = useState(new Set()), [confirmDel, setConfirmDel] = useState(false);

    const isM = mode === "master", sys = isM ? "Sei l'assistente del DM per Dark Matter. Accesso totale al lore. Rispondi in italiano." : "Sei un oracolo per i giocatori di Dark Matter. Solo info pubbliche. Rispondi in italiano.";
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: sys, messages: [{ role: "user", content: `LORE:\n${buildLore(isM)}\n\nDOMANDA: ${q}` }] }) });
      const json = await res.json(), ans = json.content?.map(b => b.text || "").join("") || "Nessuna risposta.";
      const nh = [...aiHistory, { q, a: ans, ts: new Date().toLocaleTimeString() }]; setAiHistory(nh); persist(data, nh);
    } catch (err) { setAiHistory(h => [...h, { q, a: `⚠️ ${err.message}`, ts: "" }]); }
    setAiLoading(false);
  }
  async function handleFileUpload(ev) {
    const f = ev.target.files?.[0]; if (!f) return; setImportLoading(true); setImportFileName(f.name); setImportText("");
    try { setImportText(await readFile(f)); } catch (err) { alert(`Errore: ${err.message}`); } setImportLoading(false); ev.target.value = "";
  }
  function handleImport() {
    if (!importText.trim()) return;
    const entry = mkEntry(); entry.title = importFileName ? importFileName.replace(/\.[^.]+$/, "") : `Import ${new Date().toLocaleDateString()}`; entry.publicContent = importText;
    const nd = { ...data, [importSection]: [...getEntries(importSection), entry] }; setData(nd); persist(nd, aiHistory);
    setImportText(""); setImportFileName(""); setView("section"); setActiveSection(importSection);
  }

  const isMaster = mode === "master", accent = isMaster ? "#7c3aed" : "#0ea5e9";
  const curSec = SECTIONS.find(s => s.id === activeSection), entries = getEntries(activeSection);
  const pgList = getEntries("pg");
  const SPECIAL = ["razze","storia","campagna","pg","png","diario"];

  if (mode === "login") return (
    <div style={{ background: "linear-gradient(135deg,#0f0f1a,#1a0a2e)", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Segoe UI',sans-serif" }}>
      <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 16, padding: 40, width: 340, textAlign: "center" }}>
        <div style={{ fontSize: 48, marginBottom: 8 }}>🌌</div>
        <h1 style={{ color: "#e2d9f3", fontSize: 22, fontWeight: 700, margin: "0 0 4px" }}>Dark Matter</h1>
        <p style={{ color: "#8b7aa8", fontSize: 13, margin: "0 0 24px" }}>Compendio di Campagna</p>
        <button onClick={() => setMode("player")} style={{ width: "100%", padding: "10px 0", borderRadius: 8, border: "1px solid #0ea5e9", background: "transparent", color: "#0ea5e9", fontWeight: 600, cursor: "pointer", fontSize: 13, marginBottom: 12 }}>👥 Accedi come Giocatore</button>
        <div style={{ borderTop: "1px solid rgba(255,255,255,0.08)", paddingTop: 16 }}>
          <p style={{ color: "#8b7aa8", fontSize: 12, margin: "0 0 10px" }}>{pwdSet ? "Accesso Master" : "Crea password Master"}</p>
          <input type="password" placeholder={pwdSet ? "Password..." : "Scegli una password..."} value={inputPwd} onChange={e => setInputPwd(e.target.value)} onKeyDown={e => e.key === "Enter" && handleLogin()} style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.07)", color: "#fff", fontSize: 14, boxSizing: "border-box", marginBottom: 10 }} />
          <button onClick={handleLogin} style={{ width: "100%", padding: "10px 0", borderRadius: 8, border: "none", background: "linear-gradient(90deg,#7c3aed,#a855f7)", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 14, marginBottom: 12 }}>🔐 {pwdSet ? "Entra come Master" : "Crea Account Master"}</button>
          <button onClick={handleReset} style={{ width: "100%", padding: "7px 0", borderRadius: 8, border: "1px solid rgba(239,68,68,0.3)", background: "transparent", color: "#ef444480", cursor: "pointer", fontSize: 11 }}>🗑 Reset dati</button>
        </div>
      </div>
    </div>
  );

  const sidebarItems = [
    { id: "ai", icon: "🤖", label: "AI Oracolo", color: "#a855f7" },
    ...(isMaster ? [{ id: "import", icon: "📥", label: "Importa Lore", color: "#10b981" }, { id: "backup", icon: "💾", label: "Backup", color: "#f59e0b" }] : []),
    { id: "logout", icon: "🚪", label: "Esci", color: "#8b7aa8" }
  ];

  return (
    <div style={{ display: "flex", height: "100vh", background: "#0f0f1a", fontFamily: "'Segoe UI',sans-serif", color: "#e2d9f3", overflow: "hidden" }}>
      <div style={{ width: sidebarOpen ? 220 : 56, transition: "width 0.2s", background: "#12122a", borderRight: "1px solid rgba(255,255,255,0.07)", display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ padding: "16px 12px", display: "flex", alignItems: "center", gap: 8, borderBottom: "1px solid rgba(255,255,255,0.07)" }}>
          <button onClick={() => setSidebarOpen(v => !v)} style={{ background: "none", border: "none", color: "#8b7aa8", cursor: "pointer", fontSize: 18, padding: 0 }}>☰</button>
          {sidebarOpen && <span style={{ fontSize: 13, fontWeight: 700, color: accent }}>🌌 Dark Matter</span>}
        </div>
        {sidebarOpen && <div style={{ margin: "10px 10px 0", padding: "6px 10px", borderRadius: 8, background: isMaster ? "rgba(124,58,237,0.15)" : "rgba(14,165,233,0.15)", border: `1px solid ${accent}30`, fontSize: 11, fontWeight: 700, color: accent, textAlign: "center" }}>{isMaster ? "⚙️ MASTER" : "👤 GIOCATORE"}</div>}
        <nav style={{ flex: 1, overflowY: "auto", padding: "8px 6px" }}>
          {SECTIONS.map(sec => { const active = activeSection === sec.id && view === "section"; return <button key={sec.id} onClick={() => { setActiveSection(sec.id); setView("section"); setConfirmClear(false); }} style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "9px 8px", borderRadius: 8, border: "none", background: active ? `${accent}20` : "transparent", color: active ? accent : "#8b7aa8", cursor: "pointer", fontSize: 13, fontWeight: active ? 700 : 400, textAlign: "left", marginBottom: 2 }}><span style={{ fontSize: 16, flexShrink: 0 }}>{sec.icon}</span>{sidebarOpen && <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{sec.label}</span>}</button>; })}
        </nav>
        <div style={{ padding: "10px 6px", borderTop: "1px solid rgba(255,255,255,0.07)" }}>
          {sidebarItems.map(item => <button key={item.id} onClick={() => item.id === "logout" ? setMode("login") : setView(item.id)} style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "9px 8px", borderRadius: 8, border: "none", background: view === item.id ? `${item.color}20` : "transparent", color: view === item.id ? item.color : "#8b7aa8", cursor: "pointer", fontSize: 13, fontWeight: 600, marginBottom: 2 }}><span style={{ fontSize: 16 }}>{item.icon}</span>{sidebarOpen && item.label}</button>)}
        </div>
      </div>

      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{ padding: "14px 24px", borderBottom: "1px solid rgba(255,255,255,0.07)", display: "flex", alignItems: "center", justifyContent: "space-between", background: "#12122a", flexShrink: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 20 }}>{view === "ai" ? "🤖" : view === "import" ? "📥" : view === "backup" ? "💾" : curSec?.icon}</span>
            <h2 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>{view === "ai" ? "AI Oracolo" : view === "import" ? "Importa Lore" : view === "backup" ? "Backup & Ripristino" : view === "edit" ? "Modifica Voce" : curSec?.label}</h2>
            {saved && <span style={{ fontSize: 11, color: "#10b981", fontWeight: 600 }}>✓ Salvato</span>}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            {view === "section" && isMaster && !SPECIAL.includes(activeSection) && entries.length > 0 && (confirmClear
              ? <><span style={{ fontSize: 12, color: "#ef4444" }}>Sicuro?</span><button onClick={clearSection} style={{ padding: "6px 12px", borderRadius: 8, border: "none", background: "#ef4444", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>Sì</button><button onClick={() => setConfirmClear(false)} style={{ padding: "6px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "transparent", color: "#8b7aa8", cursor: "pointer", fontSize: 12 }}>No</button></>
              : <button onClick={() => setConfirmClear(true)} style={{ padding: "8px 12px", borderRadius: 8, border: "1px solid rgba(239,68,68,0.3)", background: "transparent", color: "#ef4444", fontWeight: 600, cursor: "pointer", fontSize: 13 }}>🗑 Svuota</button>
            )}
            {view === "section" && isMaster && !["storia","diario"].includes(activeSection) && (
              <button onClick={() => { setEditingEntry(mkEntry()); setView("edit"); }} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: `linear-gradient(90deg,${accent},#a855f7)`, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13 }}>+ Aggiungi</button>
            )}
            {(view === "edit" || view === "import" || view === "backup") && <button onClick={() => setView("section")} style={{ padding: "7px 14px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "transparent", color: "#8b7aa8", cursor: "pointer", fontSize: 13 }}>← Indietro</button>}
          </div>
        </div>

        <div style={{ flex: 1, overflow: "hidden", display: "flex" }}>
          {view === "section" && activeSection === "razze" && <RaceSection entries={entries} isMaster={isMaster} onEdit={e => { setEditingEntry(e); setView("edit"); }} onDelete={deleteEntry} />}
          {view === "section" && activeSection === "storia" && <TimelineView entries={entries} />}
          {view === "section" && activeSection === "campagna" && <CampagnaView entries={entries} isMaster={isMaster} onEdit={e => { setEditingEntry(e); setView("edit"); }} onDelete={deleteEntry} />}
          {view === "section" && activeSection === "pg" && <PgSection entries={entries} isMaster={isMaster} onEdit={e => { setEditingEntry(e); setView("edit"); }} onDelete={deleteEntry} />}
          {view === "section" && activeSection === "png" && <PngSection entries={entries} isMaster={isMaster} onEdit={e => { setEditingEntry(e); setView("edit"); }} onDelete={deleteEntry} />}
          {view === "section" && activeSection === "diario" && <DiarioView pgList={pgList} isMaster={isMaster} />}
          {view === "section" && !SPECIAL.includes(activeSection) && <GenericSection entries={entries} isMaster={isMaster} accent={accent} onEdit={e => { setEditingEntry(e); setView("edit"); }} onDelete={deleteEntry} onClear={clearSection} />}

          {view === "edit" && editingEntry && isMaster && (
            <div style={{ flex: 1, overflowY: "auto", padding: 24 }}>
              {activeSection === "png"
                ? <PngEditor entry={editingEntry} onSave={saveEntry} onCancel={() => setView("section")} accent={accent} />
                : <EntryEditor entry={editingEntry} onSave={saveEntry} onCancel={() => setView("section")} accent={accent} />}
            </div>
          )}

          {view === "backup" && isMaster && (
            <div style={{ flex: 1, overflowY: "auto", padding: 40 }}>
              <div style={{ maxWidth: 500, margin: "0 auto", display: "flex", flexDirection: "column", gap: 20 }}>
                <div style={{ background: "rgba(245,158,11,0.08)", border: "1px solid rgba(245,158,11,0.25)", borderRadius: 14, padding: 24 }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "#f59e0b", marginBottom: 8 }}>📤 Esporta Backup</div>
                  <p style={{ fontSize: 13, color: "#8b7aa8", margin: "0 0 16px" }}>Scarica tutti i dati in un file JSON.</p>
                  <button onClick={exportData} style={{ padding: "12px 24px", borderRadius: 10, border: "none", background: "linear-gradient(90deg,#f59e0b,#d97706)", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 14 }}>💾 Scarica Backup JSON</button>
                </div>
                <div style={{ background: "rgba(16,185,129,0.08)", border: "1px solid rgba(16,185,129,0.25)", borderRadius: 14, padding: 24 }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "#10b981", marginBottom: 8 }}>📥 Ripristina Backup</div>
                  <p style={{ fontSize: 13, color: "#8b7aa8", margin: "0 0 16px" }}>Carica un JSON precedente. <strong style={{ color: "#ef4444" }}>Sovrascrive i dati attuali.</strong></p>
                  <label style={{ display: "inline-flex", alignItems: "center", gap: 10, padding: "12px 24px", borderRadius: 10, border: "2px dashed rgba(16,185,129,0.4)", background: "rgba(16,185,129,0.06)", color: "#10b981", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
                    📂 Carica file JSON
                    <input type="file" accept=".json" style={{ display: "none" }} onChange={importData} />
                  </label>
                </div>
              </div>
            </div>
          )}

          {view === "ai" && (
            <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: 24, overflow: "hidden" }}>
              <div style={{ maxWidth: 720, width: "100%", margin: "0 auto", display: "flex", flexDirection: "column", flex: 1, overflow: "hidden" }}>
                <div style={{ marginBottom: 12, padding: "10px 14px", borderRadius: 10, background: isMaster ? "rgba(124,58,237,0.1)" : "rgba(14,165,233,0.1)", border: `1px solid ${accent}30`, fontSize: 12, color: accent, flexShrink: 0 }}>{isMaster ? "⚙️ Master: l'AI conosce tutto il lore." : "👤 Giocatore: solo info pubbliche."}</div>
                <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 12, paddingBottom: 8 }}>
                  {aiHistory.length === 0 && <div style={{ color: "#4a4a6a", textAlign: "center", paddingTop: 60 }}>Fai una domanda sull'universo Dark Matter...</div>}
                  {aiHistory.map((h, i) => (
                    <div key={i}>
                      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 6 }}><div style={{ background: `${accent}20`, border: `1px solid ${accent}30`, borderRadius: "12px 12px 4px 12px", padding: "8px 14px", maxWidth: "75%", fontSize: 13 }}>{h.q}</div></div>
                      <div style={{ display: "flex", gap: 8 }}><span style={{ fontSize: 20 }}>🤖</span><div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "4px 12px 12px 12px", padding: "8px 14px", maxWidth: "80%", fontSize: 13, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{h.a}</div></div>
                    </div>
                  ))}
                  {aiLoading && <div style={{ color: "#8b7aa8", fontSize: 13, textAlign: "center" }}>⏳ Consultando il lore...</div>}
                  <div ref={aiBottomRef} />
                </div>
                <div style={{ display: "flex", gap: 10, paddingTop: 12, borderTop: "1px solid rgba(255,255,255,0.07)", flexShrink: 0 }}>
                  <input value={aiQuery} onChange={e => setAiQuery(e.target.value)} onKeyDown={e => e.key === "Enter" && askAI()} placeholder="Chiedi qualcosa sul lore..." style={{ flex: 1, padding: "12px 16px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.05)", color: "#fff", fontSize: 14 }} />
                  <button onClick={askAI} disabled={aiLoading} style={{ padding: "12px 20px", borderRadius: 10, border: "none", background: `linear-gradient(90deg,${accent},#a855f7)`, color: "#fff", fontWeight: 700, cursor: aiLoading ? "not-allowed" : "pointer", opacity: aiLoading ? 0.6 : 1 }}>✨ Chiedi</button>
                </div>
                {aiHistory.length > 0 && <button onClick={() => { setAiHistory([]); persist(data, []); }} style={{ marginTop: 8, background: "none", border: "none", color: "#4a4a6a", fontSize: 12, cursor: "pointer" }}>🗑 Cancella cronologia</button>}
              </div>
            </div>
          )}

          {view === "import" && isMaster && (
            <div style={{ flex: 1, overflowY: "auto", padding: 24 }}>
              <div style={{ maxWidth: 640, margin: "0 auto" }}>
                <p style={{ color: "#8b7aa8", fontSize: 13, marginBottom: 20 }}>Carica un file o incolla il testo.</p>
                <div style={{ marginBottom: 14 }}>
                  <label style={{ fontSize: 12, color: "#8b7aa8", display: "block", marginBottom: 6 }}>Sezione di destinazione</label>
                  <select value={importSection} onChange={e => setImportSection(e.target.value)} style={{ padding: "10px 14px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.12)", background: "#1a1a35", color: "#e2d9f3", fontSize: 14, width: "100%" }}>
                    {SECTIONS.map(s => <option key={s.id} value={s.id}>{s.icon} {s.label}</option>)}
                  </select>
                </div>
                <div style={{ marginBottom: 16 }}>
                  <label style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, padding: "18px 24px", borderRadius: 12, border: "2px dashed rgba(16,185,129,0.4)", background: "rgba(16,185,129,0.08)", color: importLoading ? "#8b7aa8" : "#10b981", fontWeight: 700, fontSize: 14, cursor: importLoading ? "wait" : "pointer" }}>
                    {importLoading ? "⏳ Lettura..." : importFileName ? `✅ ${importFileName}` : "📂 Scegli file"}
                    <input type="file" accept=".txt,.md,.json,.csv,.pdf" disabled={importLoading} style={{ display: "none" }} onChange={handleFileUpload} />
                  </label>
                </div>
                <textarea value={importText} onChange={e => setImportText(e.target.value)} placeholder="...oppure incolla qui" style={{ width: "100%", height: 240, padding: 14, borderRadius: 10, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.04)", color: "#e2d9f3", fontSize: 13, lineHeight: 1.6, resize: "vertical", boxSizing: "border-box" }} />
                <button onClick={handleImport} disabled={!importText.trim()} style={{ marginTop: 12, padding: "12px 28px", borderRadius: 10, border: "none", background: "linear-gradient(90deg,#10b981,#059669)", color: "#fff", fontWeight: 700, cursor: importText.trim() ? "pointer" : "not-allowed", fontSize: 14, opacity: importText.trim() ? 1 : 0.5 }}>📥 Importa</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
